name: Deploy to FTP Server Stage
on:
  push:
    branches:
      - 'feature/**'

  pull_request:
    types: [opened, reopened]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ASPNETCORE_ENVIRONMENT: Staging
    steps:

      - name: Upgrade & Update
        run: sudo apt-get update && sudo apt-get upgrade

      - name: Install FTP client
        run: sudo apt-get install -y lftp

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10'

      - name: Inject connection string
        run: |
          sed -i 's|"DefaultConnection": ""|"DefaultConnection": "${{ secrets.DB_CONNECTIONSTRING }}"|g' DuncanLaud.WebUI/appsettings.Staging.json

      - name: Build the application
        run: dotnet build --configuration Release

      - name: Publish the application
        run: dotnet publish DuncanLaud.WebUI/DuncanLaud.WebUI.csproj --configuration Release --output ./publish --runtime win-x86 --self-contained false -p:PublishTrimmed=false -p:PublishSingleFile=false

      - name: Set ASPNETCORE_ENVIRONMENT in web.config
        run: |
          python3 - <<'EOF'
          import re
          with open('./publish/web.config', 'r') as f:
              content = f.read()
          env_block = '<environmentVariables><environmentVariable name="ASPNETCORE_ENVIRONMENT" value="Staging" /></environmentVariables>'
          # Convert self-closing <aspNetCore ... /> to <aspNetCore ...>{env_block}</aspNetCore>
          content = re.sub(r'(<aspNetCore\b[^>]*?)\s*/>', r'\1>' + env_block + '</aspNetCore>', content)
          with open('./publish/web.config', 'w') as f:
              f.write(content)
          EOF

      - name: Deploy via FTP
        run: |
          lftp -c "set ftp:ssl-allow no;
                   set net:timeout 600;
                   set net:max-retries 3;
                   set log:enabled true;
                   open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER/stage;
                   mirror --parallel=10 -R --verbose ./publish /" || true
        env:
          FTP_USERNAME: ${{ secrets.STAGE_USERNAME }}
          FTP_PASSWORD: ${{ secrets.STAGE_PASSWORD }}
          FTP_SERVER: ${{ secrets.STAGE_SERVER }}
