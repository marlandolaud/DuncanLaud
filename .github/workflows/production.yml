name: Deploy to FTP Server Production
on:
  push:
    branches:
      - master
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ASPNETCORE_ENVIRONMENT: Production
    steps:

      - name: Upgrade & Update
        run: sudo apt-get update

      - name: Install FTP client
        run: sudo apt-get install -y lftp

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10'

      - name: Inject connection string
        run: |
          sed -i 's|"DefaultConnection": ""|"DefaultConnection": "${{ secrets.DB_CONNECTIONSTRING }}"|g' DuncanLaud.WebUI/appsettings.Production.json

      - name: Build the application
        run: dotnet build --configuration Release

      - name: Publish the application
        run: dotnet publish DuncanLaud.WebUI/DuncanLaud.WebUI.csproj --configuration Release --output ./publish --runtime win-x86 --self-contained false -p:PublishTrimmed=false -p:PublishSingleFile=false

      - name: Set ASPNETCORE_ENVIRONMENT in web.config
        run: |
          python3 - <<'EOF'
          import re
          with open('./publish/web.config', 'r') as f:
              content = f.read()
          env_block = '<environmentVariables><environmentVariable name="ASPNETCORE_ENVIRONMENT" value="Production" /></environmentVariables>'
          # Convert self-closing <aspNetCore ... /> to <aspNetCore ...>{env_block}</aspNetCore>
          content = re.sub(r'(<aspNetCore\b[^>]*?)\s*/>', r'\1>' + env_block + '</aspNetCore>', content)
          # Add URL rewrite passthrough rule for /api/* so that any server-level SPA
          # rewrite rule (which rewrites extensionless paths to /index.html) does not
          # intercept API routes before they reach the ASP.NET Core routing pipeline.
          # Distributed rules run before global/server rules in IIS URL Rewrite.
          rewrite_block = '''
          <rewrite>
            <rules>
              <rule name="API Passthrough" stopProcessing="true">
                <match url="^api/" />
                <action type="None" />
              </rule>
            </rules>
          </rewrite>'''
          content = content.replace('</system.webServer>', rewrite_block + '\n    </system.webServer>')
          with open('./publish/web.config', 'w') as f:
              f.write(content)
          EOF

      - name: Deploy via FTP
        run: |
          lftp -c "set ftp:ssl-allow no;
                   set net:timeout 600;
                   set net:max-retries 3;
                   set log:enabled true;
                   open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER/duncan-prod;
                   mirror --parallel=10 -R --verbose ./publish /" || true
        env:
          FTP_USERNAME: ${{ secrets.PROD_USERNAME }}
          FTP_PASSWORD: ${{ secrets.PROD_PASSWORD }}
          FTP_SERVER: ${{ secrets.PROD_SERVER }}
