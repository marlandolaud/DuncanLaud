name: Deploy to FTP Server Production
on:
  push:
    branches:
      - master
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ASPNETCORE_ENVIRONMENT: Production
    steps:

      - name: Upgrade & Update
        run: sudo apt-get update

      - name: Install FTP client
        run: sudo apt-get install -y lftp

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10'

      - name: Inject connection string
        env:
          CONN: ${{ secrets.DB_CONNECTIONSTRING }}
        run: |
          python3 - <<'EOF'
          import json, os
          path = 'src/DuncanLaud.WebUI/appsettings.Production.json'
          conn = os.environ['CONN']
          with open(path, 'r') as f:
              data = json.load(f)
          data['ConnectionStrings']['DefaultConnection'] = conn
          data['ConnectionStrings']['Analytics'] = conn
          with open(path, 'w') as f:
              json.dump(data, f, indent=2)
          EOF


      - name: Build the application
        run: dotnet build --configuration Release

      - name: Publish the application
        run: dotnet publish src/DuncanLaud.WebUI/DuncanLaud.WebUI.csproj --configuration Release --output ./publish --runtime win-x86 --self-contained false -p:PublishTrimmed=false -p:PublishSingleFile=false

      - name: Set ASPNETCORE_ENVIRONMENT in web.config
        run: |
          python3 - <<'EOF'
          import re
          with open('./publish/web.config', 'r') as f:
              content = f.read()
          env_block = '<environmentVariables><environmentVariable name="ASPNETCORE_ENVIRONMENT" value="Production" /></environmentVariables>'
          # Convert self-closing <aspNetCore ... /> to <aspNetCore ...>{env_block}</aspNetCore>
          content = re.sub(r'(<aspNetCore\b[^>]*?)\s*/>', r'\1>' + env_block + '</aspNetCore>', content)
          # Enable stdout logging for diagnostics
          content = content.replace('stdoutLogEnabled="false"', 'stdoutLogEnabled="true"')
          with open('./publish/web.config', 'w') as f:
              f.write(content)
          EOF

      - name: Take app offline (unlock DLLs so FTP can overwrite them)
        run: |
          echo '<!doctype html><html><body><h1>Updating — back in a moment.</h1></body></html>' > app_offline.htm
          lftp -c "set ftp:ssl-allow no;
                   set net:timeout 60;
                   open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER/duncan-prod;
                   put -O / app_offline.htm"
        env:
          FTP_USERNAME: ${{ secrets.PROD_USERNAME }}
          FTP_PASSWORD: ${{ secrets.PROD_PASSWORD }}
          FTP_SERVER: ${{ secrets.PROD_SERVER }}

      - name: Deploy via FTP
        run: |
          lftp -c "set ftp:ssl-allow no;
                   set net:timeout 600;
                   set net:max-retries 3;
                   set log:enabled true;
                   open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER/duncan-prod;
                   mirror --parallel=10 --no-perms -R --verbose ./publish /"
        env:
          FTP_USERNAME: ${{ secrets.PROD_USERNAME }}
          FTP_PASSWORD: ${{ secrets.PROD_PASSWORD }}
          FTP_SERVER: ${{ secrets.PROD_SERVER }}

      - name: Bring app back online
        if: always()
        run: |
          lftp -c "set ftp:ssl-allow no;
                   set net:timeout 60;
                   open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER/duncan-prod;
                   rm -f /app_offline.htm"
        env:
          FTP_USERNAME: ${{ secrets.PROD_USERNAME }}
          FTP_PASSWORD: ${{ secrets.PROD_PASSWORD }}
          FTP_SERVER: ${{ secrets.PROD_SERVER }}
