name: duncanlaud-debug

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DB_SA_PASSWORD}
    volumes:
      - db-data:/var/opt/mssql
    ports:
      - "1433:1433"
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -No -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    build:
      context: ..
      dockerfile: dockercompose/Dockerfile.debug
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=duncanlaud;User Id=sa;Password=${DB_SA_PASSWORD};TrustServerCertificate=true;
      - Logging__LogLevel__Default=Debug
      - Logging__LogLevel__Microsoft.AspNetCore=Information
    volumes:
      - ../DuncanLaud.WebUI:/src/DuncanLaud.WebUI
      - ../DuncanLaud.Domain:/src/DuncanLaud.Domain
      - ../DuncanLaud.Infrastructure:/src/DuncanLaud.Infrastructure
      - ../DuncanLaud.DTOs:/src/DuncanLaud.DTOs
    depends_on:
      db:
        condition: service_healthy

  react:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "3000:3000"
    volumes:
      - ../duncanlaud-react:/app
      - react-node-modules:/app/node_modules
    environment:
      - VITE_API_URL=http://web:5000

volumes:
  db-data:
  react-node-modules:
