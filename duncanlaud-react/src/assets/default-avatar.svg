  <!-- Eyes -->
  <ellipse cx="52" cy="42" rx="3.5" ry="4" fill="#4a3520"/>
  <ellipse cx="68" cy="42" rx="3.5" ry="4" fill="#4a3520"/>

  <!-- Eye shine -->
  <circle cx="53.5" cy="40.5" r="1.2" fill="white"/>
  <circle cx="69.5" cy="40.5" r="1.2" fill="white"/>

  <!-- Smile -->
