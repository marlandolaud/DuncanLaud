  <!-- Cheeks -->
  <circle cx="44" cy="50" r="5" fill="#e8a080" opacity="0.4"/>
  <circle cx="76" cy="50" r="5" fill="#e8a080" opacity="0.4"/>

  <!-- Neck -->
